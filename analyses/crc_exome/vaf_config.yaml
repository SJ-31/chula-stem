root: "../../analyses/data_all/output/CRC/EXOME-PAIRED"
outdir: "../../analyses/output/crc_exome"
conda: "nf" # conda environment for reticulate
manifest: "../../nextflow/input/manifests/crc_exome_paired.csv"
date: "2026-01-28"
src:
  py: "../../src/chula_stem"
  r: "../../src/R"
cohort: "CEN2"

extra:
  cases: ["CEN2_N18", "CEN2_N27", "D-CEN2-N20", "D-CEN2-N22"]
  multiqc_vep:
    [
      "../../analyses/data_all/output/CRC/EXOME-TUMOR_ONLY/8-CEN2-MultiQC_data/vep.txt",
    ]

alignment_plot:
  reference_genome: "../../analyses/data_all/reference/genomes/GRCh38.p14_filtered.fasta"
  window: 50 # Width of alignment for plotting
  # Plot file dimensions
  width: 12
  height: 12
  with_prob: False
  protein_only: True # Only allow variants that affect proteins
  target_symbols:
    - "KRAS"
    - "TP53"

variant_calling:
  paired: True # Set to False if results are from `wes_tumor_only`
  min_alt_depth: 1 # Minimum depth that variants are counted in the plot
  protein_only: False

plot:
  dpi: 500
  width: 15
  height: 10

variant_table:
  wanted_genes: ["KRAS", "TP53"]

only_curated: False # Only allow named variants, regardless of type

accepted_consequence: # Only these variant types are plotted, if !`only_curated`
  # follows naming convention for variant consequences used by VEP
  # See https://grch37.ensembl.org/info/genome/variation/prediction/predicted_data.html
  - "missense_variant"
  - "frameshift_variant"
  # - "downstream_gene_variant"
  # - "upstream_gene_variant"
  # - "intron_variant"
  - "3_prime_UTR_variant"
  - "stop_gained"
  - "splice_region_variant"
  - "inframe_deletion"
  - "splice_donor_5th_base_variant"
  - "NMD_transcript_variant"

wanted_genes: # Entries are mappings in the form gene_symbol: "chr:start-end"
  TP53: "17:7661779-7687546"
  APC: "5:112707518-112846239"
  AIM2: "1:159056129-159187843" # may contribute to immune escape
  PIK3CA: "3:179148114-179240093" # "double somatic" sCRC
  # MAPK cascade genes
  KRAS: "12:25205246-25250936"
  NRAS: "1:114704469-114716771"
  # MMR-D LS-CRC associated genes
  MLH1: "3:36993226-37050896"
  MSH2: "2:47403067-47663146"
  MSH6: "2:47695530-47810063"
  PMS2: "7:5970925-6009130"
  EPCAM: "2:47345158-47387601"
  # Detected to be positively selected by dndscv [2025-08-07 Thu]
  PARP4: "13:24420931-24512778"
  NDUFV2: "18:9102630-9134345"
  GXYLT1: "12:42081845-42144874"

allowed_variants: # Mapping of gene symbols to a list of specific variants
  # variant identifiers can be in either HGVSp or HGVSg format
  KRAS:
    - "ENSP00000256078.5:p.Gly12Asp"
