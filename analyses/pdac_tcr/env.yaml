root: "/home/shannc/Bio_SDD/chula-stem"
output: "analyses/output/pdac_tcr"

reference_files:
  vdjdb: "analyses/data/vdjdb.h5ad"
  iedb: "analyses/data/iedb.h5ad"
  mcpas: analyses/data/McPAS-TCR.csv"

bd_results: # Paths to directories containing BD Rhapsody Sequence Analysis pipeline results
  # Keys are expected to be the 'Run_name' pipeline parameter
  TCR2: "output/PDAC_TCR_2025-09-24/TCR2"
  # TCR1: "../../output/PDAC_TCR_2025-09-24/TCR1"

cell_type_col: "Cell_Type_Experimental"

sample_col: "Sample_Name"

alpha_metrics: ["richness", "pielou_e", "simpson"] # Following recommendations
#

# * Reference querying

query_reference:
  top: 5 # Only query the top k clones
  rank_key: "clone_id_Sample_Name_rank"
  tcrmatch:
    m: 4 # Maximum amount of ram
    t: 1 # Number of threads
    threshold: 0.97 # From manuscript
    databases:
      cedar: "analyses/data/CEDAR_data.tsv"
      iedb: "analyses/data/IEDB_data.tsv"
  scirpy:
    metric: "tcrdist" # TODO: need to read some literature on the best metric
    cutoff: null # TODO: cutoff depends on the metric
    sequence: "aa"
    receptor_arms: "all"
    dual_ir: "any"
    match_columns: null
  compairr:

# * Full sequences
get_sequences:
  top: 5 # If provided, get sequences for only the top clones from each sample
  rank_key: "clone_id_Sample_Name_rank"
  min_length: 10 # TODO: check this with literature
  stitchr:
    use_aa: false
    multiple: true
    args:
      species: HUMAN
      extra_genes: null
      seamless: false
      only_linked: false
      preferred_alleles_path: null
      codon_usage: null
      skip_c_checks: false
      skip_n_checks: false
      no_leader: false

# * Cell annotation

annotate_cells: # Cell annotation configuration with cellassign
  cellassign:
    run: false
    marker_file: "./cellassign_markers.csv"
    symbol_col: "Symbol"
    train_kws:
      max_epochs: 300

# * Clonotype calling
clonotype_calling: # Parameters for scirpy's clonotype calling pipeline
  ir_dist:
    cutoff: null
  define_clonotype_clusters:
    # TODO: figure out proper params for doing this
    metric: "identity"
    sequence: "aa"
    receptor_arms: "all"
    dual_ir: "any"
  clonotype_network:
    min_cells: 10
    min_nodes: 1
  clonotype_cluster_network:
    min_cells: 10
    min_nodes: 1

# * Clonal expansion
clonal_expansion:
  breakpoints: [1, 2]

# * Sample parameters
ignore_samples: ["Multiplet", "Undetermined"]

# samples: ["PDAC51", "PDAC80", "PDAC81", "PDAC82", "PDAC83", "PHcase3"]
# TODO: [2025-10-05 Sun] uncomment the above when you actually get those files
samples: ["PDAC82", "PDAC83", "PHcase3"]

sample_tags: # Mapping of sample tag numbers to names
  7: PDAC51
  8: PDAC80
  9: PDAC81
  10: PDAC82
  11: PDAC83
  12: PHcase3

# * Plotting
to_plot: ["Sample_Name", "receptor_subtype", "chain_pairing", "run"]
