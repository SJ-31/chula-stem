root: "/home/shannc/Bio_SDD/chula-stem"
output: "analyses/output/pdac_tcr"
conda: "/home/shannc/Bio_SDD/miniforge3"

reference_files:
  vdjdb: "analyses/data/vdjdb.h5ad"
  iedb: "analyses/data/iedb.h5ad"
  mcpas: analyses/data/McPAS-TCR.csv"
  tcrdb:
    PRJNA768494: "analyses/data/tcrdb/PRJNA768494"
    immunoSEQ43: "analyses/data/tcrdb/immunoSEQ43"
    immunoSEQ72: "analyses/data/tcrdb/immunoSEQ72"

bd_results: # Paths to directories containing BD Rhapsody Sequence Analysis pipeline results
  # Keys are expected to be the 'Run_name' pipeline parameter
  TCR2: "output/PDAC_TCR_2025-09-24/TCR2"
  TCR1: "output/PDAC_TCR_2025-09-24/TCR1"

cell_type_col: "Cell_Type_Experimental"

sample_col: "Sample_Name"
obs_cols_include: ["clone_id_Sample_Name_rank", "clone_id", "clone_id_size"] # Columns to include in summary csvs

alpha_metrics: ["richness", "pielou_e", "simpson"] # Following recommendations
#

# * Reference querying

query_reference:
  top: 5 # Only query the top k clones
  rank_key: "clone_id_Sample_Name_rank"
  tcrmatch:
    m: 4 # Maximum amount of ram
    t: 1 # Number of threads
    threshold: 0.97 # From manuscript
    databases:
      cedar: "analyses/data/CEDAR_data.tsv"
      iedb: "analyses/data/IEDB_data.tsv"
  compairr:
    differences: 1
    cdr3: false
    indels: false # TODO: check if you should include these
    threads: 1
    score: "product"
    nucleotides: false
  scirpy:
    metric: "tcrdist"
    cutoff: null # TODO: cutoff depends on the metric
    sequence: "aa"
    receptor_arms: "all"
    dual_ir: "any"
    match_columns: null

# * Full sequences
get_sequences:
  top: 5 # If provided, get sequences for only the top clones from each sample
  rank_key: "clone_id_Sample_Name_rank"
  min_length: 10 # TODO: check this with literature
  stitchr: # [2025-10-10 Fri] TODO: currently unused
    use_aa: false
    multiple: true
    args:
      species: HUMAN
      extra_genes: null
      seamless: false
      only_linked: false
      preferred_alleles_path: null
      codon_usage: null
      skip_c_checks: false
      skip_n_checks: false
      no_leader: false

mixtcrpred:
  env: "mixtcrpred"
  dir: "/home/shannc/Bio_SDD/stem_synology/chula_mount/shannc/repos/MixTCRpred"
  top: 3
  rank_key: "clone_id_Sample_Name_rank"
  ignore_incomplete: False
  models: # Commented out are neoepitope models that are't high-confidence
    [
      "A0201_NLNCCSVPV",
      # "A0201_RLPGVLPRA",
      # "A0201_KLWASPLHV",
      # "A0201_ALYGFVPVL",
      # "A0201_VVMSWAPPV",
      # "A0201_ILTGLNYEV",
      # "A0201_ALSPVIPHI",
      # "A0201_ILNAMIAKI",
      # "H2-IEk_VITAFTEGLK",
      # "DRA0101_DRB10101_RFNLIANQHLLAPGF",
      # "A0201_FLYNLLTRV",
      # "A0201_AVGSYVYSV",
      # "A0201_VLFHRAFLV",
      # "A0201_LLSIIFFPA",
      # "A0201_FMLYLLTLM",
      # "A0201_LMFWASSSI",
      # "DRB10401_NFIRMVISNPAAT",
      # "A0201_KMVAVFYNT",
      # "A0201_LLFGMPPCL",
      # "A3002_MTLHGFMMY",
      # "A3002_MTLHGHMMY",
      # "A0201_MMPFSIVYI",
      # "A0201_FLTVFSHFM",
      # "A0201_IMDQVPFSV",
      # "A0201_TLWCSPIKV",
      # "A0201_FLIYLDVSV",
      # "A0201_ILNVDIFTL",
      # "A0201_VLNYFKPYL",
      # "A0201_YVLTWIVGA",
      # Others
      "H2-Db_HGIRNASFI",
      "H2-Kb_TVYGFCLL",
    ]

# * Cell annotation

annotate_cells: # Cell annotation configuration with cellassign
  cellassign:
    run: false
    marker_file: "./cellassign_markers.csv"
    symbol_col: "Symbol"
    train_kws:
      max_epochs: 300

# * Clonotype calling
clonotype_calling: # Parameters for scirpy's clonotype calling pipeline
  ir_dist:
    cutoff: null
  define_clonotype_clusters:
    metric: "tcrdist"
    sequence: "aa"
    receptor_arms: "all"
    dual_ir: "any"
  clonotype_network:
    min_cells: 10
    min_nodes: 1
  clonotype_cluster_network:
    min_cells: 10
    min_nodes: 1

# * Clonal expansion
clonal_expansion:
  breakpoints: [1, 2]

# * Sample parameters
ignore_samples: ["Multiplet", "Undetermined"]

samples: ["PDAC51", "PDAC80", "PDAC81", "PDAC82", "PDAC83", "PHcase3"]

sample_tags: # Mapping of sample tag numbers to names
  7: PDAC51
  8: PDAC80
  9: PDAC81
  10: PDAC82
  11: PDAC83
  12: PHcase3

# * Plotting
to_plot: ["Sample_Name", "receptor_subtype", "chain_pairing", "run"]

vdj_plot:
  top: 3
  rank_key: "clone_id_Sample_Name_rank"
  title_spec:
    - ["Clone ID", "clone_id"]
    - ["Sample", "Sample_Name"]
    - ["Rank in sample", "clone_id_Sample_Name_rank"]
    - ["Clone Size", "clone_id_size"]
  wrap_length: 300
  width: 40
  dpi: 500

# * Fusion primer design
create_primers:
  tm_function:
    method: default # one of default or neb
    prodcode: ???
  target_tm: 60
  how: pydna
  overhangs:
    # Optionally add overhang sequences e.g. restriction sites to insert the fusion
    # product
    pair_1_forward: ???
    pair2_reverse: ???
  wanted_clones:
    - ["136", "PDAC83"]
    - ["354", "PDAC82"]
