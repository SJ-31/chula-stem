root: "/data/project/stemcell/shannc/output/PDAC"
outdir: "/data/home/shannc/chula-stem/analyses/output/pdac"
conda: "nf"
manifest: "/data/home/shannc/chula-stem/nextflow/input/manifests/pdac.csv"
src: # source directories
  py: "../../src/chula_stem"
  r: "../../src/R"

response: "/data/home/shannc/chula-stem/analyses/pdac_dresponse/all_responses.tsv"
reference_responses:
  ["/data/home/shannc/chula-stem/analyses/pdac_dresponse/li_et_al_filtered.tsv"]
unit: "AUC" # Unit used to quantify drug response

extra:
  cases:
    [
      "PHcase_1",
      "PHcase_6",
      "N45_2",
      "N51_2",
      "N56_2",
      "N59_2",
      "N68_2",
      "N76_1",
      "N80_1",
    ]

# * Feature encoding

transcript_id2uniprot:
  file: "/home/shannc/Bio_SDD/chula-stem/analyses/data/2025-09-09_ensembl2uniprot.tsv" # REQUIRED: mapping file path
  uniprot_colname: "uniprotswissprot"
  ensembl_id_colname: "ensembl_transcript_id"

uniprot_features:

# ** Per-drug gene symbols

limit_symbols:
  cnv-msi: True
  uniprot_features: True
  vep_consequence: False
  binary: False

driver_mutations: # Loc, HGVSg or HGVSp for specific driver mutations to use in the `binary` encoding style. A map of variant name to the identifier column
  KRAS_Gly12:
    HGVSp:
      - "ENSP00000256078.5:p.Gly12Asp"
      - "ENSP00000256078.5:p.Gly12Cys"
      - "ENSP00000256078.5:p.Gly12Val"
      - "ENSP00000256078.5:p.Gly12Arg"
  TP53_DBD:
    HGVSp:
      - "ENSP00000269305.4:p.Arg248Gln"
      - "ENSP00000269305.4:p.Arg175His"

per_drug_encoding:
  Paclitaxel:
    all: [
        "PGP", # P-glycoprotein
        "BCRP", # Breast cancer resistance protein
        "ABCG2",
        "TP53",
        "ABCB1",
        "ABCA4",
        "ABCB5",
        "WDR7", # TRAG
        "CSAG2", # TRAG3
        "EDIL3",
        "CYP3A4",
        "CYP2C8",
        "HIF1A-AS2",
        "AK124454",
        "H19",
        "LINC-ROR",
        "FTH1P3",
        "CCL26",
        "CCL2",
        "TSPAN9",
        "MLLT11",
      ]
    msi: null
    cnv: ["ABCB1", "ABCA4", "ABCB5"]
