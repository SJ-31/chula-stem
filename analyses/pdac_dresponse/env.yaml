root: "/data/project/stemcell/shannc/output/PDAC"
outdir: "/data/home/shannc/chula-stem/analyses/output/pdac"
conda: "nf"
manifest: "/data/home/shannc/chula-stem/nextflow/input/manifests/pdac.csv"
src: # source directories
  py: "../../src/chula_stem"
  r: "../../src/R"
ah_cache: "/data/home/shannc/remote/.cache/R/AnnotationHub" # Path to annotationhub cache, leave empty for default location

response_data: "/data/home/shannc/chula-stem/analyses/pdac_dresponse/all_responses.tsv"
response_cols: ["Paclitaxel", "Gemcitabine", "SN-38", "5-FU", "Oxaliplatin"]

reference_responses:
  ["/data/home/shannc/chula-stem/analyses/pdac_dresponse/li_et_al_filtered.tsv"]
unit: "AUC" # Unit used to quantify drug response
#
response_groups: # Predicates on quantiles used to define groups
  sensitive: "<0.25" # Below 0.25 quantile
  resistant: ">0.75"
  intermediate: null

extra:
  cases:
    [
      "PHcase_1",
      "PHcase_6",
      "N45_2",
      "N51_2",
      "N56_2",
      "N59_2",
      "N68_2",
      "N76_1",
      "N80_1",
    ]

# * Feature encoding

transcript_id2uniprot:
  file: "/data/home/shannc/chula-stem/analyses/data/2025-09-09_ensembl2uniprot.tsv"
  # REQUIRED: mapping file path
  uniprot_colname: "uniprotswissprot"
  ensembl_id_colname: "ensembl_transcript_id"

uniprot_features:

allowed_consequence:
  - missense
  - transcript_ablation
  - missense_variant
  - frameshift_variant
  - downstream_gene_variant
  - upstream_gene_variant
  - intron_variant
  - "3_prime_UTR_variant"
  - stop_gained
  - splice_region_variant
  - inframe_deletion
  - splice_donor_5th_base_variant
  - NMD_transcript_variant

# ** Per-drug gene symbols

# - uniprot_feature # TODO: fix this one later

driver_mutations: # Loc, HGVSg or HGVSp for specific driver mutations to use in the `binary` encoding style. A map of variant name to the identifier column
  KRAS_Gly12:
    HGVSp:
      - "ENSP00000256078.5:p.Gly12Asp"
      - "ENSP00000256078.5:p.Gly12Cys"
      - "ENSP00000256078.5:p.Gly12Val"
      - "ENSP00000256078.5:p.Gly12Arg"
  TP53_DBD:
    HGVSp:
      - "ENSP00000269305.4:p.Arg248Gln"
      - "ENSP00000269305.4:p.Arg175His"

per_drug_encoding_styles: ["vep_consequence", "cnv-msi"] # Only do these encoding styles

per_drug_encoding:
  Paclitaxel:
    all: "/data/home/shannc/chula-stem/analyses/pdac_dresponse/paclitaxel_genes.txt"
    msi: null
    cnv: "/data/home/shannc/chula-stem/analyses/pdac_dresponse/paclitaxel_genes.txt"
  # Gemcitabine: TODO: do only one for now
  #   all: [""]
  #   msi: [""]
  #   cnv: [""]
  # SN-38:
  # 5-FU:
  # Oxaliplatin:
