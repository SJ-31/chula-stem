__variables__:
  o: ["analyses", "output", "cluster_reproducibility"]
workdir: ["analyses", "cluster_reproducibility"]
outs:
  simulated: ?o + ["simulated"]
  clustered: ?o + ["clustered"]
seed: 31042
n_genes: 3000
datasets:
  simulation:
    sim_lfc_double:
      tot.samples: 300
      n.genes: ?this['n_genes']
      pDE: 0.1
      lfc.thrld: 1
    sim_lfc_double_high:
      tot.samples: 300
      n.genes: ?this['n_genes']
      pDE: 0.3
      lfc.thrld: 1
    sim_lfc_quad:
      tot.samples: 300
      pDE: 0.1
      n.genes: ?this['n_genes']
      lfc.thrld: 2
  real:
    chula_pdac: ["analyses", "pdac_subtyping", "pdac_cohort.h5ad"]
    tcga_chol: ["data_all", "public_data", "h5ad", "TCGA_CHOL.h5ad"]
    target: ["data_all", "public_data", "h5ad", "TARGET_ALL.h5ad"]
    chula_organoids:
      ["data_all", "public_data", "h5ad", "in_house_organoids.h5ad"]
