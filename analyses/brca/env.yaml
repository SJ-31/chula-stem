raw_path: "analyses/data_all/public_data/BRCA"
metadata_path: "analyses/data/brca_metadata"
probe_mapping: "analyses/data/u133a_mapping.tsv"

id_col: "geo_accession" # Default id_col in metadata used to join with the
# column names of raw data if no `id_col` key is provided below
platform_col: "platform_id"
gene_id: "ncbi"

cols_blacklist_re:
  - contact_zip/postal_code

# TODO: if Aj needs you to re-analyze the microarray data, whenever you can, download the raw files (e.g. CEL files for Affymetrix) and renormalize to a common standard e.g. with the oligo package (https://bioconductor.org/packages/release/bioc/html/oligo.html)

datasets:
  # GSE116335: TODO: clinical data available on request only

  GSE192341:
    id_col: "title"
    gene_id: "ENSEMBL"
    files:
      raw: "GSE192341_processed_data_clean.tsv"
    meta_remap:
      t_stage: "t-stage:ch1"
      subtype: "subtype:ch1"
      recurrent: "recurrence:ch1"
      age: "age:ch1"
      treatment_response: "pathological complete response (pcr):ch1"
    meta_replace:
      recurrent:
        "no": 0 # quotes are required around "yes", "no" keys
        "yes": 1
    meta_fill:
      treatment: "neoadjuvant_chemotherapy"
      collection_period: "2000-2013"
      sample_type: "primary"
      pre_post: post
      expression_unit: "counts (lcount)"

  GSE191127: # pre-post dataset from the authors of GSE192341
    id_col: "description.1"
    gene_id: "ENSEMBL"
    files:
      raw: "GSE191127_readcounts_prepost_clean.tsv"
    meta_remap:
      patient_id: "title"
      t_stage: "t-stage:ch1"
      subtype: "subtype:ch1"
      recurrent: "recurrence:ch1"
      treatment: "chemotherapy:ch1"
      pre_post: "title"
    meta_fill:
      collection_period: "2000-2013"
      sample_type: "primary"
      expression_unit: "counts (lcount)"
    meta_str_remove:
      patient_id: ["_B", "_S"]
    meta_match_re:
      pre_post:
        pre: "_B"
        post: "_S"

  GSE34138:
    id_col: "description"
    files:
      raw: GSE34138_non-normalized_clean.tsv
    meta_remap:
      subtype: "intrinsic molecular subtype:ch1"
      treatment_response: "response:ch1"
    meta_fill:
      treatment: "ddAC" #  dose-dense doxorubicin/cyclophosphamide
      pre_post: pre
      expression_unit: "array intensity (normalized to probeset level)"

  GSE119937:
    meta_remap:
      age: "age at diagnosis:ch1"
      er_status: "estrogen receptor positive:ch1"
      pr_status: "progesterone receptor positive?:ch1"
      treatment: "was hormonal therapy given?:ch1"
      t_stage: "t stage:ch1"
      histological_type: "histology of invasive disease:ch1"
      histological_grade: grade:ch1
      sample_type: "group:ch1"
      recurrent: "sample type:ch1"
    meta_replace:
      treatment:
        "yes": "mastectomy + hormone_therapy"
        ".default": "mastectomy"
      recurrent:
        primary: 0
        recurrent: 1
      sample_type:
        "ctl": "primary"
        "lrr": "loco_regional"
        "dm": "distant_metastasis"
    meta_fill:
      collection_period: "1997-2018"
      pre_post: post
      expression_unit: "counts (featureCounts)"

  yzxtxn4nmd:
    id_col: "GEX.assay"
    files:
      meta:
        # - yzxtxn4nmd_Normal.66.tsv
        - yzxtxn4nmd_SCANB.9206.tsv
      raw: "SCANB.9142.matrixprepDEgenecount.tsv"
    gene_id: "ENSEMBL"
    meta_remap:
      patient_id: "Patient"
      pr_status: "PR"
      her2_status: "HER2"
      er_status: "ER"
      histological_type: "OpBiopsy.InvCa"
      treatment: "TreatGroup"
      age: "Age (5-year range, e.g., 35(31-35), 40(36-40), 45(41-45) etc.)"
    meta_fill:
      platform_name: "Illumina TruSeq"
      collection_period: "2010-2018"
      expression_unit: "counts (StringTie)"
      pre_post: post
    meta_replace:
      treatment:
        endo: "endocrine_adjuvant"
        chemo: chemotherapy
        chemoendo: "chemotherapy + endocrine_adjuvant"
        immu: immunotherapy
        immuchemo: "immunotherapy + chemotherapy"
        immuchemoendo: "immunotherapy + chemotherapy + endocrine_adjuvant"
    meta_filter:
      SpecimenType: ["LN", "Normal"]

  GSE194040-GPL20078:
    id_col: "patient id:ch1"
    microarray: true
    meta_remap:
      her2_status: "her2:ch1"
      patient_id: "patient id:ch1"
      treatment: "arm:ch1"
    meta_fill:
      collection_period: "2010-2017"
      pre_post: "pre"
      expression_unit: "array intensity (normalized to probeset level)"
  GSE194040-GPL30493:
    id_col: "patient id:ch1"
    microarray: true
    files:
      raw: "GSE194040_GPL30493.tsv"
    meta_remap:
      her2_status: "her2:ch1"
      patient_id: "patient id:ch1"
      treatment: "arm:ch1"
    meta_fill:
      collection_period: "2010-2017"
      pre_post: "pre"
      expression_unit: "array intensity (normalized to probeset level)"

  GSE162187:
    meta_remap:
      age: "age:ch1"
      subtype: "molecular subtype:ch1"
      treatment: "treatment:ch1"
      treatment_response: "treatment response:ch1"
      histological_grade: "histological grade:ch1"
      histological_type: "histological type:ch1"
    meta_fill:
      sample_type: "primary"
      pre_post: post
      expression_unit: "counts (featureCounts)"

  GSE163882:
    meta_remap:
      pr_status: "progesterone receptor status:ch1"
      her2_status: "her2 receptor status:ch1"
      er_status: "estrogen receptor status:ch1"
      age: "age:ch1"
      t_stage: "breast cancer stage:ch1"
      treatment_response: "response to nac:ch1"
    files:
      raw: "GSE163882_raw_counts_GRCh38.p13_NCBI.tsv"
    meta_fill:
      treatment: "neoadjuvant_chemotherapy"
      pre_post: "pre"
      expression_unit: "counts (featureCounts)"

  GSE123845:
    id_col: "title"
    gene_id: "SYMBOL"
    meta_remap:
      subtype: "subtype_pam50:ch1"
      pr_status: "pr_status_diagnosis:ch1"
      treatment: "nac_drug:ch1"
      pre_post: "time:ch1"
      her2_status: "her2_status_diagnosis:ch1"
      er_status: "er_status_diagnosis:ch1"
      histological_type: "cell_type_diagnosis:ch1"
      age: "age:ch1"
      t_stage: "tnm_stage_clinical:ch1"
    meta_match_re:
      pre_post:
        "pre": "T1"
        "post": "T[23]"
    meta_fill:
      collection_period: "2015-2019"
      expression_unit: "TPM (RSEM)"

  GSE80999:
    microarray: true
    probeset_id_col: "ProbeName"
    files:
      raw: "GSE80999.tsv"
    meta_remap:
      her2_status: "human epidermal growth factor receptor 2 (her2) status:ch1"
      er_status: "estrogen receptor (er) status:ch1"
      subtype: "pam50 subgroup:ch1"
      histological_grade: "histological grade:ch1"
    meta_fill:
      collection_period: "2003-2010"
      pre_post: "pre"
      expression_unit: "array intensity (normalized to probeset level and site-adjusted)"
      platform: "GPL13607"

  # SRP157974: # TODO: finish the nextflow run of this
  #   id_col: "Project_ID"
  #   meta_remap:
  #     age: "Age_at_surgery"
  #     subtype: "Intrinsic_Subtype"
  #     histological_type: "Histology"
  #     histological_grade: "Grade"
  #     pr_status: "PR_IHC_score"
  #     er_status: "ER_IHC_score"
  #   meta_fill:
  #     expression_unit: "counts (STAR)"
  #     platform: "GPL20301"
  #     collection_period: "2007-2014"

  HS_CPTAC_2018:
    id_col: "Sample.ID"
    meta_remap:
      subtype: "PAM50"
      t_stage: "Stage"
      er_status: "ER"
      pr_status: "PR"
    meta_fill:
      expression_unit: "log2(FPKM), normalized by gene median"
      platform: "GPL20301"
      collection_period: "NA"
      pre_post: "pre"

  # * Endopredict datasets
  # ** Original dataset
  GSE26971:
    meta_fill:
      platform: "GPL96"
      expression_unit: "MAS5 signal after scaling the average to the target of 500"
    meta_remap:
      subcohort: "center/subcohort:ch1"
      dmfs_time: "metastasis free interval (months):ch1"
      dmfs_status: "metastasis (1:ch1"
    meta_replace:
      dmfs_status:
        "yes, 0: no/censored): 0": 0
        "yes, 0: no/censored): 1": 1
  # ** Additional Affymetrix U133A array datasets
  # The authors also have re-normalized versions of the below
  GSE6532-GPL96:
    id_col: "geo_accn_hg-u133a"
    files:
      meta:
        - "GSE6532_LUMINAL_demo.txt"
    meta_remap:
      dmfs_time: "t.dmfs"
      dmfs_status: "e.dmfs"
    meta_fill:
      platform: "GPL96"
      expression_unit: "RMA normalized signal intensity"
  GSE12093:
    meta_fill:
      expression_unit: "MAS5 signal after scaling the average to the target of 600"
      platform: "GPL96"
    meta_remap:
      dmfs_time: "DFS.time:ch1"
      dmfs_status: "DFS.status:ch1"
