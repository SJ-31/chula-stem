[build-system]
requires = ["maturin>=1.7,<2.0"]
build-backend = "maturin"

[project]
name = "chula_stem"
requires-python = ">=3.8"
dependencies = ["vcfpy"]
classifiers = [
    "Programming Language :: Rust",
    "Programming Language :: Python :: Implementation :: CPython",
    "Programming Language :: Python :: Implementation :: PyPy",
]
dynamic = ["version"]
[tool.maturin]
features = ["pyo3/extension-module"]
module-name = "chula_stem._rust"

[project.scripts]
vcf_info_add_tag = "chula_stem.utils:vcf_info_add_tag"
dncsv_buildref = "chula_stem.dndscv:buildref"
