__use_yte__: true

__variables__:
  remote: /data/project/stemcell/shannc
  workdir: /data/home/shannc/chula-stem/snakemake/mouse_authentication

outdir: ?f"{remote}/DrNipan_CU/2026-04-04_mouse_wgs/authentication"
logdir: ?f"{workdir}/logs"

read_suffix: "fq.gz"

samples: # Map of sample name to their containing directory. Keys are expected to be the
  # prefix of the sample reads within the directory e.g. there
  SO1P21-LJC15576_L1: ?f"{remote}/DrNipan_CU/2026-04-04_mouse_wgs/raw_data"
  SO2P19-LJC15575_L1: ?f"{remote}/DrNipan_CU/2026-04-04_mouse_wgs/raw_data"
  # - sample1: "/data/reads" We expect /data/reads to contain sample1_1.fq.gz, sample2_2.fq.gz

# Should be the GRCm38 assembly, to be consistent with the STR locations used in the
# reference BED file
ref_genome: ?f"{remote}/reference/genomes/mouse/GCF_000001635.27_GRCm39_genomic.fna"
strling_index: ?f"{remote}/reference/tool_specific/GCF_000001635.27_GRCm39_genomic.fna.str"

resources:
  bwa_mem2:
    mem: 100G
    qos: cpu24h
    cpus-per-task: 8
  bwa_mem2_index:
    mem: 80G
