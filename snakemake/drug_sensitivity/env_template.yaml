root: "" # Root path of wes results
outdir: "" # Root path for output
conda: "" # conda environment for reticulate
manifest: "" # Nextflow manifest file used for WES pipeline
src: # source directories
  py: "../../src/chula_stem"
  r: "../../src/R"

ah_cache: "" # Path to annotationhub cache, leave empty for default location

response_data: "" # Drug response data file. Tabular format, rows are samples, columns are drugs
response_cols: ["Paclitaxel", "Gemcitabine", "SN-38", "5-FU", "Oxaliplatin"] # Columns in
# response data file to analyze

reference_responses: [] # Optional: reference drug response data
unit: "AUC" # Unit used to quantify drug response
#
exome_targets: null # Exome target bed file, for limiting the universe of genes in
# enrichment analyses.
# Expected format: seqname, start, end, features
# "features" is a comma-delimited list of features found between the interval

response_groups: # Predicates on quantiles used to define groups
  sensitive: "<0.25" # Below 0.25 quantile
  resistant: ">0.75"
  intermediate: null

extra:
  cases: [] # Specify additional cases that may not be on the manifest to include in plot
  # Must symlink/copy these cases' directories into `root` for this to work

accepted_consequence: # Only these variant types are included, if !`only_curated`
  # follows naming convention for variant consequences used by VEP
  # See https://grch37.ensembl.org/info/genome/variation/prediction/predicted_data.html
  - "missense_variant"
  - "frameshift_variant"
  - "downstream_gene_variant"
  - "upstream_gene_variant"
  - "intron_variant"
  - "3_prime_UTR_variant"
  - "stop_gained"
  - "splice_region_variant"
  - "inframe_deletion"
  - "splice_donor_5th_base_variant"
  - "NMD_transcript_variant"

# TODO: figure out what to do for this
wanted_genes: # Entries are mappings in the form gene_symbol: "chr:start-end"
  TP53: "17:7661779-7687546"
  APC: "5:112707518-112846239"
  AIM2: "1:159056129-159187843"
  PIK3CA: "3:179148114-179240093"
  KRAS: "12:25205246-25250936"
  NRAS: "1:114704469-114716771"
  MLH1: "3:36993226-37050896"
  MSH2: "2:47403067-47663146"
  MSH6: "2:47695530-47810063"
  PMS2: "7:5970925-6009130"
  EPCAM: "2:47345158-47387601"

# * Plotting
palette_c: "ggthemes::Blue Light"
palette_d:

# * Feature encoding

transcript_id2uniprot:
  file: "/home/shannc/Bio_SDD/chula-stem/analyses/data/2025-09-09_ensembl2uniprot.tsv" # REQUIRED: mapping file path
  uniprot_colname: "uniprotswissprot"
  ensembl_id_colname: "ensembl_transcript_id"

uniprot_features:

# ** Per-drug gene symbols

driver_mutations: # Loc, HGVSg or HGVSp for specific driver mutations to use in the `binary` encoding style. A map of variant name to the identifier column
  KRAS_Gly12:
    HGVSp:
      - "ENSP00000256078.5:p.Gly12Asp"
      - "ENSP00000256078.5:p.Gly12Cys"
      - "ENSP00000256078.5:p.Gly12Val"
      - "ENSP00000256078.5:p.Gly12Arg"
  TP53_DBD:
    HGVSp:
      - "ENSP00000269305.4:p.Arg248Gln"
      - "ENSP00000269305.4:p.Arg175His"

per_drug_encoding_styles: ["vep_consequence", "cnv-msi"] # Only do these encoding styles
# with per-drug restrictions

per_drug_encoding: # Map of drug names to gene symbols to encode as features
  # Examples
  Paclitaxel:
    all: ["KRAS", "PLOD3", "ZNF493"]
    msi: [""]
    cnv: [""]
  Gemcitabine:
    all: [""]
    msi: [""]
    cnv: [""]
