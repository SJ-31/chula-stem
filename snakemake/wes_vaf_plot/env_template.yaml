outdir: "" # Root path for output
conda: "" # conda environment for reticulate

sample_spec: # A list of mappings, each with the following keys
  - root: "" # Root path of wes results
    manifest: "" # Nextflow manifest file used for WES pipeline
    cohort: "8-CEN2"
    cases: [] # Specify additional cases that may not be on the manifest to include in plot
  # Must symlink/copy these cases' directories into `root` for this to work

src: # source directories
  py: "../../src/chula_stem"
  r: "../../src/R"

get_alignments: False # Set to true to get alignment plots instead

sample_labels:
  null # Mapping describing additional labels to be displayed for each sample
  # Keys are the names of the labeling scheme e.g. `Moffitt` for tumor subtypes
  # Values are also lists, which must have two keys:
  # file - TSV file mapping sample names to the label
  # palette - name of a paletteer palette to use for fill
  # Moffitt:
  #   file:
  #   palette:
  # Waddell:
  #   file:
  #   palette:

individual_gene_plots: # Plots showing the distribution of variants for specific genes in cohort
  wanted: ["TP53", "KRAS"]
  palette_c:
  palette_d:
  dpi: 500

variant_calling:
  paired: True # Set to False if results are from `wes_tumor_only`
  min_alt_depth: 10 # Minimum depth that variants are counted in the plot
  protein_only: True # If true, only allow variants that affect proteins
plot:
  dpi: 500
  width: 15
  height: 10

alignment_plot:
  reference_genome: "/data/project/stemcell/shannc/reference/genomes/GRCh38.p14_filtered.fasta" # Path to reference genome fasta file
  ref_add_chr: True # Add the "chr" prefix to reference genome
  sample_add_chr: True # Add the "chr" prefix to sample vcf positions
  window: 50 # Width of alignment for plotting
  protein_only: True # If true, only allow variants that affect proteins
  target_symbols: # Symbols whose variants to plot
    - "KRAS"
    - "TP53"

variant_table:
  wanted_genes: ["KRAS", "TP53"]

only_curated: False # Only allow named variants, regardless of type

accepted_consequence: # Only these variant types are plotted, if !`only_curated`
  # follows naming convention for variant consequences used by VEP
  # See https://grch37.ensembl.org/info/genome/variation/prediction/predicted_data.html
  - "missense_variant"
  - "frameshift_variant"
  - "downstream_gene_variant"
  - "upstream_gene_variant"
  - "intron_variant"
  - "3_prime_UTR_variant"
  - "stop_gained"
  - "splice_region_variant"
  - "inframe_deletion"
  - "splice_donor_5th_base_variant"
  - "NMD_transcript_variant"

wanted_genes: # Entries are mappings in the form gene_symbol: "chr:start-end"
  TP53: "17:7661779-7687546"
  APC: "5:112707518-112846239"
  AIM2: "1:159056129-159187843" # may contribute to immune escape
  PIK3CA: "3:179148114-179240093" # "double somatic" sCRC
  # MAPK cascade genes
  KRAS: "12:25205246-25250936"
  NRAS: "1:114704469-114716771"
  # MMR-D LS-CRC associated genes
  MLH1: "3:36993226-37050896"
  MSH2: "2:47403067-47663146"
  MSH6: "2:47695530-47810063"
  PMS2: "7:5970925-6009130"
  EPCAM: "2:47345158-47387601"

allowed_variants: # Mapping of gene symbols to a list of specific variants
  # variant identifiers can be in either HGVSp or HGVSg format
  KRAS:
    - "ENSP00000256078.5:p.Gly12Asp"
